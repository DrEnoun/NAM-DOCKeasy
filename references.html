<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAM-DOCKeasy — References</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="icons/icon-192.png">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="accent-coral" data-screen-label="References">

<button class="menu-toggle" id="menuToggle">☰</button>
<div id="root"></div>

<script src="content.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
function App() {
  const D = window.DOCKEASY;
  const [sidebarOpen, setSidebarOpen] = useState(false);
  useEffect(() => {
    const btn = document.getElementById('menuToggle');
    const h = () => setSidebarOpen(v => !v);
    btn?.addEventListener('click', h);
    return () => btn?.removeEventListener('click', h);
  }, []);
  return (
    <>
      <Sidebar currentPage="references" open={sidebarOpen} onDismiss={() => setSidebarOpen(false)} />
      <main className="main">
        <div className="hero" style={{padding: '52px 48px 44px'}}>
          <div className="hero-tag">Reference</div>
          <h1>Citations</h1>
          <p className="hero-sub" style={{maxWidth: 600}}>Primary publications for every tool, scoring function, and pass-criterion quoted in the protocol. Use these in your manuscript reference list.</p>
        </div>
        <section className="content-section">
          {D.CITATIONS.map(c => (
            <div className="ref-item" key={c.num}>
              <span className="ref-num">[{c.num}]</span>
              <span dangerouslySetInnerHTML={{__html: c.text}} />
              {c.doi ? <> · <span className="ref-doi">doi:{c.doi}</span></> : null}
            </div>
          ))}
        </section>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
/* PWA — register service worker for offline use */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .catch(err => console.warn('[sw] register failed', err));
  });
}
</script>
</body>
</html>
