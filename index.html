<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAM-DOCKeasy — Molecular Docking Core Framework</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
/* Home-only layout */
.home-grid {
  padding: 56px 48px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}
.home-card {
  background: white;
  border: 1px solid var(--gray-2);
  border-radius: 12px;
  padding: 24px 26px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow 0.2s, transform 0.2s;
  text-decoration: none;
  color: inherit;
}
.home-card:hover { box-shadow: 0 12px 32px rgba(10,22,40,0.12); transform: translateY(-2px); }
.home-card .hc-letter {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 22px;
  background: var(--hc-bg, var(--gray-1));
  color: var(--hc-fg, var(--gray-5));
}
.home-card .hc-title { font-family: var(--font-display); font-size: 22px; color: var(--dark); line-height: 1.2; }
.home-card .hc-body  { font-size: 13px; color: var(--gray-4); line-height: 1.65; }
.home-card .hc-cta { margin-top: auto; font-size: 12px; font-weight: 600; color: var(--de-accent-dark); display: inline-flex; align-items: center; gap: 6px; }
.home-card .hc-cta::after { content: '→'; }

.home-card.coral { --hc-bg: var(--de-accent-lt); --hc-fg: var(--de-accent-dark); }
.home-card.teal  { --hc-bg: var(--teal-lt);     --hc-fg: var(--teal-dark); }
.home-card.gold  { --hc-bg: var(--gold-lt);     --hc-fg: var(--gold-dark); }
.home-card.sage  { --hc-bg: var(--sage-lt);     --hc-fg: var(--sage-dark); }
.home-card.lilac { --hc-bg: var(--lilac-lt);    --hc-fg: var(--lilac-dark); }

.home-cta-row {
  padding: 0 48px 24px;
}

/* Author credit bar — top of page, above hero */
.author-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 48px;
  background: linear-gradient(90deg, #FFFFFF 0%, #F8FAFD 100%);
  border-bottom: 1px solid var(--gray-2);
}
.author-bar .author-portrait {
  width: 52px; height: 52px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 18%;
  background: var(--gray-1);
  border: 1px solid var(--gray-2);
  flex-shrink: 0;
}
.author-bar .author-eyebrow {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--de-accent-dark);
  margin-bottom: 2px;
}
.author-bar .author-name {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 2px;
}
.author-bar .author-aff {
  font-size: 12px;
  color: var(--gray-4);
  line-height: 1.4;
}

/* "Start here" guide — a numbered checklist that sits between hero & cards */
.start-here {
  margin: 32px 48px 0;
  background: white;
  border: 1px solid var(--gray-2);
  border-radius: 14px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}
.start-here::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--de-accent) 0%, var(--de-accent-dark) 100%);
}
.start-here-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
.start-here-eyebrow {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--de-accent-dark);
}
.start-here-title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--dark);
  line-height: 1.2;
  margin: 0;
  font-weight: 400;
}
.start-here-title em { font-style: italic; color: var(--de-accent-dark); }
.start-here-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.sh-step {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px 14px;
  background: linear-gradient(180deg, #FBFCFE 0%, #F4F7FB 100%);
  border: 1px solid var(--gray-2);
  border-radius: 10px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.sh-step:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15,23,42,0.06); border-color: color-mix(in srgb, var(--de-accent) 30%, var(--gray-2)); }
.sh-step .sh-num {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  color: var(--de-accent-dark);
  letter-spacing: 0.06em;
}
.sh-step .sh-label {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.3;
}
.sh-step .sh-detail {
  font-size: 11.5px;
  color: var(--gray-4);
  line-height: 1.45;
}

.home-foot {
  padding: 28px 48px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  border-top: 1px solid var(--gray-2);
  font-size: 11.5px; color: var(--gray-4);
  line-height: 1.6;
}
.home-foot a { color: var(--de-accent-dark); text-decoration: none; font-weight: 600; }
.home-foot .foot-brand {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--dark);
}
.home-foot .foot-brand em { font-style: italic; color: var(--de-accent-dark); }

@media (max-width: 768px) {
  .home-grid { grid-template-columns: 1fr; padding: 28px 20px; }
  .home-cta-row { padding: 0 20px 20px; }
  .author-bar { padding: 12px 20px; gap: 12px; }
  .author-bar .author-portrait { width: 44px; height: 44px; }
  .author-bar .author-name { font-size: 15px; }
  .author-bar .author-aff { font-size: 11px; }
  .start-here { margin: 24px 20px 0; padding: 18px 18px 18px 20px; }
  .start-here-steps { grid-template-columns: 1fr 1fr; }
  .home-foot { flex-direction: column; align-items: flex-start; padding: 24px 20px 40px; }
}
@media (max-width: 480px) {
  .start-here-steps { grid-template-columns: 1fr; }
}
}
.brand-block .brand-name em { font-style: italic; color: var(--de-accent-dark); }

@media (max-width: 768px) {
  .home-grid { grid-template-columns: 1fr; padding: 28px 20px; }
  .home-cta-row { padding: 0 20px 20px; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="accent-coral" data-screen-label="Home">

<button class="menu-toggle" id="menuToggle">☰</button>
<div id="root"></div>

<script src="content.js"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="InteractiveDecisionTree.jsx"></script>
<script type="text/babel" src="DecisionTreeModal.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "accent": "coral"
}/*EDITMODE-END*/;

/* Custom 5-swatch accent picker — values are accent-class tokens (coral/teal/…). */
const ACCENTS = [
  { value: 'coral', color: '#F87171' },
  { value: 'teal',  color: '#2DD4BF' },
  { value: 'sky',   color: '#38BDF8' },
  { value: 'lilac', color: '#A78BFA' },
  { value: 'amber', color: '#F59E0B' },
];
function AccentSwatchRow({ value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-label">Accent</div>
      <div style={{display:'flex', gap:6}}>
        {ACCENTS.map(a => (
          <button key={a.value}
                  onClick={() => onChange(a.value)}
                  title={a.value}
                  style={{
                    width: 26, height: 26, borderRadius: 6,
                    background: a.color,
                    border: value === a.value ? '2px solid #0F172A' : '2px solid transparent',
                    boxShadow: '0 0 0 1px rgba(0,0,0,0.06)',
                    cursor: 'pointer',
                    padding: 0,
                  }} />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULS);

  useEffect(() => {
    document.body.className = 'accent-' + t.accent;
  }, [t.accent]);

  useEffect(() => {
    const btn = document.getElementById('menuToggle');
    const h = () => setSidebarOpen(v => !v);
    btn?.addEventListener('click', h);
    return () => btn?.removeEventListener('click', h);
  }, []);

  return (
    <>
      <Sidebar currentPage="home" open={sidebarOpen} onDismiss={() => setSidebarOpen(false)} />
      <main className="main">
        {/* Author credit — top of page */}
        <div className="author-bar">
          <img className="author-portrait" src="assets/nam-portrait.jpg" alt="Portrait of Dr Nur 'Ainun Mokhtar" />
          <div>
            <div className="author-eyebrow">Developed by</div>
            <div className="author-name">Dr Nur 'Ainun Mokhtar</div>
            <div className="author-aff">Faculty of Pharmacy, UiTM Bertam, Malaysia</div>
          </div>
        </div>

        <Hero pills={false} />

        {/* Start here — guide for first-time users */}
        <div className="start-here">
          <div className="start-here-head">
            <span className="start-here-eyebrow">Start here</span>
            <h3 className="start-here-title">Before you begin — <em>4 quick steps</em></h3>
          </div>
          <div className="start-here-steps">
            <a className="sh-step" href="#" onClick={(e) => { e.preventDefault(); document.querySelector('.dtm-trigger')?.click(); }}>
              <div className="sh-num">STEP 01</div>
              <div className="sh-label">Take the decision tree</div>
              <div className="sh-detail">3 questions — get a tailored phase plan in under a minute.</div>
            </a>
            <a className="sh-step" href="tutorial.html">
              <div className="sh-num">STEP 02</div>
              <div className="sh-label">Skim the tutorial</div>
              <div className="sh-detail">Read the protocol top-to-bottom; collapse the phases you can skip.</div>
            </a>
            <a className="sh-step" href="case-study.html">
              <div className="sh-num">STEP 03</div>
              <div className="sh-label">Try the case study</div>
              <div className="sh-detail">Dock capsaicin into TRPV1 with checkpoint tracking.</div>
            </a>
            <a className="sh-step" href="quickref.html">
              <div className="sh-num">STEP 04</div>
              <div className="sh-label">Print the quick ref</div>
              <div className="sh-detail">One-page bench card — pin it above your workstation.</div>
            </a>
          </div>
        </div>

        {/* Decision-tree popup — quick-start CTA */}
        <div className="home-cta-row" style={{paddingTop: 24}}>
          <DecisionTreeButton size="hero" onNavigate={(id) => {
            window.location.href = 'tutorial.html#' + id;
          }} />
        </div>

        <div className="home-grid" style={{paddingTop: 8}}>
          <a className="home-card coral" href="tutorial.html">
            <div className="hc-letter">T</div>
            <div className="hc-title">Tutorial</div>
            <div className="hc-body">The full 9-phase protocol. Start with the interactive decision tree, then work through Receptor → Ligand → Site ID → Grid → Dock → Analyse → Interactions → Validate → MD handoff.</div>
            <div className="hc-cta">Open tutorial</div>
          </a>
          <a className="home-card sage" href="case-study.html">
            <div className="hc-letter">★</div>
            <div className="hc-title">Case study · <em style={{fontStyle:'italic'}}>Capsaicin → TRPV1</em></div>
            <div className="hc-body">A real worked example. Dock the active compound of chilli into the pain receptor (PDB 8JQR) with AMDock. Eleven checkpoint-tracked steps; paste your own screenshots into each.</div>
            <div className="hc-cta">Start case study</div>
          </a>
          <a className="home-card teal" href="quickref.html">
            <div className="hc-letter">Q</div>
            <div className="hc-title">Quick reference</div>
            <div className="hc-body">Every threshold, every default, every pass criterion on one printable card. Pin it above your bench.</div>
            <div className="hc-cta">Open quick ref</div>
          </a>
          <a className="home-card gold" href="glossary.html">
            <div className="hc-letter">G</div>
            <div className="hc-title">Glossary</div>
            <div className="hc-body">Plain-English definitions for every term used in the tutorial — from <em>binding affinity</em> to <em>π-stacking</em> to <em>PDBQT</em>.</div>
            <div className="hc-cta">Open glossary</div>
          </a>
          <a className="home-card lilac" href="references.html">
            <div className="hc-letter">R</div>
            <div className="hc-title">References</div>
            <div className="hc-body">Citable sources for every tool, scoring function, and pass-threshold quoted in the protocol.</div>
            <div className="hc-cta">Open references</div>
          </a>
        </div>

        {/* Sister project — NAM-NPeasy */}
        <a className="sister-card" href={(window.DOCKEASY.BRAND.npeasy.pages_url)} target="_blank" rel="noopener noreferrer">
          <div className="sc-mark">NP</div>
          <div>
            <div className="sc-eyebrow">Sister tutorial</div>
            <div className="sc-title">NAM-<em>NPeasy</em></div>
            <div className="sc-sub">Network Pharmacology Core Framework — herbs to pathways, the upstream half of the same protocol family.</div>
          </div>
          <div className="sc-cta">Open NPeasy</div>
        </a>

        <div className="home-foot">
          <div className="foot-brand">NAM-<em>DOCKeasy</em> · Core Framework v1.0</div>
          <div>
            Sibling tutorial to <a href={(window.DOCKEASY.BRAND.npeasy.pages_url)} target="_blank" rel="noopener noreferrer">NAM-NPeasy</a> · Faculty of Pharmacy, UiTM Bertam, Malaysia · Works offline once installed.
          </div>
        </div>
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand">
          <AccentSwatchRow value={t.accent} onChange={v => setTweak('accent', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
/* PWA — register service worker for offline use */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .catch(err => console.warn('[sw] register failed', err));
  });
}
</script>
</body>
</html>
